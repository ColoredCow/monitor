name: Production Deployment

on:
  push:
    branches: [main, feature/prod-deployment]

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: Production

    steps:
      # 1️⃣ Checkout code
      - uses: actions/checkout@v3

      # 2️⃣ Setup Node (for Vite build)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3️⃣ Install frontend deps
      - name: Install frontend dependencies
        run: npm ci

      # 4️⃣ Build frontend assets
      - name: Build frontend assets
        run: npm run build

      # 5️⃣ Rsync build output to server
      - name: Upload built assets to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "public/build"
          target: ${{ secrets.SSH_BUILD_DIRECTORY }}/public
          strip_components: 1

      # 6️⃣ Deploy backend on server
      - name: Deploy backend to production
        uses: appleboy/ssh-action@master
        env:
          SSH_BUILD_DIRECTORY: ${{ secrets.SSH_BUILD_DIRECTORY }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: SSH_BUILD_DIRECTORY
          script: |
            cd $SSH_BUILD_DIRECTORY

            echo "Enabling maintenance mode"
            php artisan down

            echo "Pulling latest backend code"
            git checkout -f feature/prod-deployment
            git pull origin feature/prod-deployment

            echo "Running migrations"
            php artisan migrate --force

            echo "Installing composer dependencies"
            composer install \
              --no-dev \
              --prefer-dist \
              --no-interaction \
              --optimize-autoloader

            echo "Optimizing Laravel"
            php artisan optimize:clear

            echo "Disabling maintenance mode"
            php artisan up
